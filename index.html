<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推拿預約表</title>
<style>
  :root {
    --bg: #e8e8e8;
    --surface: #ffffff;
    --border: #bfbfbf;
    --text: #000000;
    --muted: #595959;
    --green-head: #70ad47;
    --blue-time: #2f5597;
    --gray-time: #595959;
    --red-head: #c00000;
    --gray-head: #a6a6a6;
    --gray-rest: #d9d9d9;
    --red-text: #c00000;
    --accent: #70ad47;
    --accent-hover: #5a8f38;
    --row-alt: #f2f2f2;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .app { max-width: 100%; margin: 0 auto; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .title-group {
    display: flex;
    align-items: baseline;
    gap: 10px;
    white-space: nowrap;
  }

  .top-bar h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .title-group .year {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--muted);
  }

  .top-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex: 1;
    min-width: 0;
  }

  .top-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    white-space: nowrap;
  }

  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .mode-tabs button {
    padding: 6px 12px;
    border: none;
    background: transparent;
    border-radius: 6px;
    font-size: .8rem;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }

  .mode-tabs button:hover { color: var(--text); background: var(--row-alt); }

  .mode-tabs button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 4px;
  }

  .date-nav button {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    color: var(--text);
    flex-shrink: 0;
  }

  .date-nav button:hover { background: var(--row-alt); }

  .date-display {
    font-weight: 600;
    font-size: .8rem;
    min-width: 72px;
    padding: 0 2px;
    text-align: center;
    white-space: nowrap;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    max-height: calc(100vh - 100px);
  }

  table {
    border-collapse: collapse;
    table-layout: fixed;
    min-width: max-content;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th {
    padding: 2px 2px;
    text-align: center;
    font-size: .68rem;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    line-height: 1.15;
    vertical-align: middle;
    white-space: nowrap;
  }

  thead th.col-time {
    background: var(--blue-time);
    color: #fff;
    width: 46px;
    min-width: 46px;
    max-width: 46px;
    position: sticky;
    left: 0;
    z-index: 4;
    border-right: 1px solid var(--border);
  }

  thead th.head-date {
    background: var(--green-head);
    color: #fff;
    border-bottom: 1px solid var(--green-head);
  }

  thead th.head-date.rest {
    background: var(--gray-head);
    font-size: .5rem;
    border-bottom: 1px solid var(--gray-head);
  }

  thead th.head-wd {
    background: var(--red-head);
    color: #fff;
    font-weight: 600;
    font-size: .58rem;
    border-top: 1px solid var(--red-head);
  }

  thead th.head-wd.rest {
    background: var(--gray-head);
    font-size: .52rem;
    border-top: 1px solid var(--gray-head);
  }

  thead th.col-day {
    width: 68px;
    min-width: 68px;
    max-width: 68px;
  }

  thead th.col-day.rest {
    width: 38px;
    min-width: 38px;
    max-width: 38px;
    padding: 3px 1px;
  }

  tbody tr { border-bottom: 1px solid var(--border); }

  td {
    padding: 0;
    vertical-align: middle;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  td.time {
    text-align: center;
    font-weight: 600;
    font-size: .68rem;
    color: #fff;
    background: var(--blue-time);
    padding: 2px 1px;
    user-select: none;
    position: sticky;
    left: 0;
    z-index: 1;
    border-right: 1px solid var(--border);
    width: 46px;
    min-width: 46px;
    max-width: 46px;
  }

  td.time.time-lower {
    background: var(--gray-time);
    color: #fff;
  }

  tbody tr.time-divider td {
    border-top: 3px solid var(--red-head);
  }

  tbody tr.time-green-divider td {
    border-bottom: 2px solid var(--green-head);
  }

  tbody tr:nth-child(even) td:not(.time):not(.cell-rest) {
    background: var(--row-alt);
  }

  td.cell-rest {
    background: var(--gray-rest);
    width: 38px;
    min-width: 38px;
    max-width: 38px;
  }
  td.cell-rest .rest-label {
    display: block;
    text-align: center;
    padding: 2px 1px;
    font-size: .6rem;
    color: #595959;
    user-select: none;
    line-height: 1.1;
    font-weight: 600;
  }

  td input {
    width: 100%;
    border: none;
    outline: none;
    padding: 2px 2px;
    font-size: .68rem;
    font-family: inherit;
    background: transparent;
    color: var(--text);
    text-align: center;
  }

  td input::placeholder { color: #bdbdbd; font-size: .58rem; }

  td input:focus {
    background: #fff9e6;
    box-shadow: inset 0 0 0 1px var(--green-head);
  }

  td input.is-booked {
    color: #000;
    font-weight: 700;
  }

  td input.is-rest-text {
    color: var(--red-text);
    font-weight: 700;
    font-size: .6rem;
  }

  td.cell-copied input {
    background: #dbeafe !important;
  }

  body.paste-mode td:not(.cell-rest) input {
    background: #f6ffed;
    box-shadow: inset 0 0 0 1px var(--green-head);
  }

  .save-hint {
    text-align: center;
    font-size: .75rem;
    color: var(--muted);
    margin-top: 12px;
  }

  .save-hint.saved { color: #059669; }

  @media print {
    @page { size: landscape; margin: 8mm; }
    body { background: #fff; padding: 0; }
    .top-bar, .save-hint { display: none; }
    .table-wrap { box-shadow: none; border-radius: 0; max-height: none; overflow: visible; }
    td input { font-size: 7pt; padding: 2px; }
    thead th, td.time { position: static; }
  }
  @media (max-width: 720px) {
    .top-bar { flex-direction: column; align-items: flex-start; }
    .top-right { width: 100%; justify-content: flex-start; overflow-x: auto; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="title-group">
      <h1>推拿預約表</h1>
      <span class="year" id="yearDisplay"></span>
    </div>
    <div class="top-right">
      <div class="top-controls">
        <div class="mode-tabs" id="modeTabs">
          <button type="button" data-mode="30days" class="active">30天</button>
          <button type="button" data-mode="month">當月</button>
          <button type="button" data-mode="nextMonth">下個月</button>
          <button type="button" data-mode="year">整年</button>
        </div>
        <div class="date-nav">
          <button type="button" id="btnPrev" title="上一段">‹</button>
          <div class="date-display" id="rangeDisplay"></div>
          <button type="button" id="btnNext" title="下一段">›</button>
        </div>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="schedule"></tbody>
    </table>
  </div>

  <p class="save-hint" id="saveHint">長按姓名複製，再點其他格子貼上 · 資料自動儲存於本機瀏覽器</p>
</div>

<script src="seed-data.js"></script>
<script>
(function () {
  const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
  const REST_DAYS = [0, 2, 4, 6];
  const STORAGE_KEY = 'tuina-booking-v1';
  const SEED_VERSION = '1';
  const SEED_FLAG = STORAGE_KEY + '-seed-v';
  const INTERVAL = 10;
  const DIVIDER_TIME = '16:50';
  const VIEW_DAYS = 30;

  const tableHead = document.getElementById('tableHead');
  const tbody = document.getElementById('schedule');
  const rangeDisplay = document.getElementById('rangeDisplay');
  const yearDisplay = document.getElementById('yearDisplay');
  const modeTabs = document.getElementById('modeTabs');
  const saveHint = document.getElementById('saveHint');

  const today = startOfDay(new Date());
  let viewMode = '30days';
  let viewStart = new Date(today);
  let saveTimer = null;
  let allData = loadAll();
  let copyBuffer = '';
  let longPressTimer = null;
  let longPressed = false;
  const DEFAULT_HINT = '長按姓名複製，再點其他格子貼上 · 資料自動儲存於本機瀏覽器';

  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  }

  function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function isRestDay(date) {
    return REST_DAYS.includes(date.getDay());
  }

  function loadAll() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch {
      return {};
    }
  }

  function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    saveHint.textContent = '已儲存';
    saveHint.classList.add('saved');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveHint.textContent = copyBuffer
        ? `已複製「${copyBuffer}」· 點選其他格子貼上`
        : DEFAULT_HINT;
      saveHint.classList.remove('saved');
    }, 2000);
  }

  function showCopyHint(msg) {
    saveHint.textContent = msg;
    saveHint.classList.add('saved');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveHint.textContent = copyBuffer
        ? `已複製「${copyBuffer}」· 點選其他格子貼上`
        : DEFAULT_HINT;
      saveHint.classList.remove('saved');
    }, 2500);
  }

  function copyName(name, td) {
    copyBuffer = name;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(name).catch(() => {});
    }
    document.body.classList.add('paste-mode');
    showCopyHint(`已複製「${name}」· 點選其他格子貼上`);
    if (td) {
      td.classList.add('cell-copied');
      setTimeout(() => td.classList.remove('cell-copied'), 800);
    }
  }

  function pasteName(input, day, time) {
    input.value = copyBuffer;
    input.classList.toggle('is-booked', copyBuffer !== '休息');
    input.classList.toggle('is-rest-text', copyBuffer === '休息');
    persistSlot(day, time, copyBuffer);
    const pasted = copyBuffer;
    copyBuffer = '';
    document.body.classList.remove('paste-mode');
    showCopyHint(`已貼上「${pasted}」`);
    input.blur();
  }

  function attachCopyPaste(td, input, day, time) {
    function clearLongPress() {
      clearTimeout(longPressTimer);
    }

    function startLongPress() {
      longPressed = false;
      clearLongPress();
      longPressTimer = setTimeout(() => {
        longPressed = true;
        const val = input.value.trim();
        if (val) copyName(val, td);
      }, 500);
    }

    input.addEventListener('touchstart', startLongPress, { passive: true });
    input.addEventListener('touchend', clearLongPress);
    input.addEventListener('touchmove', clearLongPress);
    input.addEventListener('touchcancel', clearLongPress);

    input.addEventListener('mousedown', startLongPress);
    input.addEventListener('mouseup', clearLongPress);
    input.addEventListener('mouseleave', clearLongPress);

    input.addEventListener('click', e => {
      if (longPressed) {
        e.preventDefault();
        longPressed = false;
        return;
      }
      if (copyBuffer) {
        e.preventDefault();
        pasteName(input, day, time);
      }
    });

    input.addEventListener('contextmenu', () => {
      const val = input.value.trim();
      if (val) copyName(val, td);
    });
  }

  function formatTime(h, m) {
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function generateSlots() {
    const slots = [];
    let h = 17;
    let m = 0;
    while (h < 21 || (h === 21 && m <= 30)) {
      slots.push(formatTime(h, m));
      m += INTERVAL;
      if (m >= 60) { m = 0; h++; }
    }
    h = 16;
    m = 50;
    while (h > 12 || (h === 12 && m >= 40)) {
      slots.push(formatTime(h, m));
      m -= INTERVAL;
      if (m < 0) { m = 50; h--; }
    }
    return slots;
  }

  const SLOTS = generateSlots();
  const DIVIDER_INDEX = SLOTS.indexOf(DIVIDER_TIME);

  function hasGreenDivider(time, index) {
    const next = SLOTS[index + 1];
    if (!next) return false;
    if (index < DIVIDER_INDEX && time.endsWith(':50') && next.endsWith(':00')) return true;
    if (index >= DIVIDER_INDEX && time.endsWith(':00') && next.endsWith(':50')) return true;
    return false;
  }

  function getMonthDays(year, month) {
    const last = new Date(year, month + 1, 0).getDate();
    let startDay = 1;
    if (year === today.getFullYear() && month === today.getMonth()) {
      startDay = today.getDate();
    }
    const days = [];
    for (let d = startDay; d <= last; d++) {
      days.push(new Date(year, month, d));
    }
    return days;
  }

  function getFullMonthDays(year, month) {
    const last = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let d = 1; d <= last; d++) {
      days.push(new Date(year, month, d));
    }
    return days;
  }

  function getViewDays() {
    const y = viewStart.getFullYear();
    const m = viewStart.getMonth();

    if (viewMode === '30days') {
      const days = [];
      for (let i = 0; i < VIEW_DAYS; i++) {
        const d = new Date(viewStart);
        d.setDate(d.getDate() + i);
        days.push(startOfDay(d));
      }
      return days;
    }

    if (viewMode === 'month') {
      return getMonthDays(y, m);
    }

    if (viewMode === 'nextMonth') {
      return getFullMonthDays(y, m);
    }

    if (viewMode === 'year') {
      const days = [];
      const end = new Date(y, 11, 31);
      let d = new Date(viewStart);
      if (y === today.getFullYear() && d < today) d = new Date(today);
      while (d <= end) {
        days.push(startOfDay(new Date(d)));
        d.setDate(d.getDate() + 1);
      }
      return days;
    }

    return [];
  }

  function formatRangeLabel(days) {
    if (!days.length) return '';
    const first = days[0];
    const last = days[days.length - 1];

    if (viewMode === 'month' || viewMode === 'nextMonth') {
      return `${first.getMonth() + 1} 月`;
    }

    if (viewMode === 'year') {
      return '全年';
    }

    return `${first.getMonth() + 1}/${first.getDate()} – ${last.getMonth() + 1}/${last.getDate()}`;
  }

  function setViewMode(mode) {
    viewMode = mode;
    modeTabs.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });

    if (mode === '30days') {
      viewStart = new Date(today);
    } else if (mode === 'month') {
      viewStart = new Date(today.getFullYear(), today.getMonth(), 1);
    } else if (mode === 'nextMonth') {
      viewStart = new Date(today.getFullYear(), today.getMonth() + 1, 1);
    } else if (mode === 'year') {
      viewStart = new Date(today);
    }

    renderRangeHeader();
    renderTable();
  }

  function navigatePrev() {
    if (viewMode === '30days') {
      viewStart.setDate(viewStart.getDate() - VIEW_DAYS);
    } else if (viewMode === 'month' || viewMode === 'nextMonth') {
      viewStart = new Date(viewStart.getFullYear(), viewStart.getMonth() - 1, 1);
    } else if (viewMode === 'year') {
      viewStart = new Date(viewStart.getFullYear() - 1, 0, 1);
    }
    viewStart = startOfDay(viewStart);
    renderRangeHeader();
    renderTable();
  }

  function navigateNext() {
    if (viewMode === '30days') {
      viewStart.setDate(viewStart.getDate() + VIEW_DAYS);
    } else if (viewMode === 'month' || viewMode === 'nextMonth') {
      viewStart = new Date(viewStart.getFullYear(), viewStart.getMonth() + 1, 1);
    } else if (viewMode === 'year') {
      viewStart = new Date(viewStart.getFullYear() + 1, 0, 1);
    }
    viewStart = startOfDay(viewStart);
    renderRangeHeader();
    renderTable();
  }

  function getName(entry) {
    if (!entry) return '';
    if (typeof entry === 'string') return entry;
    return entry.name || '';
  }

  function applySeedData() {
    if (!window.SEED_DATA) return;
    if (localStorage.getItem(SEED_FLAG) === SEED_VERSION) return;
    Object.keys(SEED_DATA).forEach(key => {
      allData[key] = Object.assign({}, allData[key], SEED_DATA[key]);
    });
    localStorage.setItem(SEED_FLAG, SEED_VERSION);
    saveAll();
  }

  function getDayData(date) {
    const key = dateKey(date);
    return allData[key] || {};
  }

  function persistSlot(date, time, value) {
    const key = dateKey(date);
    const name = value.trim();
    if (name) {
      if (!allData[key]) allData[key] = {};
      allData[key][time] = name;
    } else if (allData[key]) {
      delete allData[key][time];
      if (Object.keys(allData[key]).length === 0) delete allData[key];
    }
    saveAll();
  }

  function renderTable() {
    const days = getViewDays();

    tableHead.innerHTML = '';

    const rowDate = document.createElement('tr');
    const thTime = document.createElement('th');
    thTime.className = 'col-time';
    thTime.rowSpan = 2;
    thTime.textContent = '時間';
    rowDate.appendChild(thTime);

    days.forEach(day => {
      const th = document.createElement('th');
      th.className = 'col-day head-date';
      if (isRestDay(day)) th.classList.add('rest');
      const m = String(day.getMonth() + 1).padStart(2, '0');
      th.textContent = `${m}月${day.getDate()}日`;
      rowDate.appendChild(th);
    });
    tableHead.appendChild(rowDate);

    const rowWd = document.createElement('tr');
    days.forEach(day => {
      const th = document.createElement('th');
      th.className = 'col-day head-wd';
      const wd = day.getDay();
      if (isRestDay(day)) th.classList.add('rest');
      th.textContent = isRestDay(day) ? `週${WEEKDAYS[wd]}` : `星期${WEEKDAYS[wd]}`;
      rowWd.appendChild(th);
    });
    tableHead.appendChild(rowWd);

    tbody.innerHTML = '';
    SLOTS.forEach((time, index) => {
      const tr = document.createElement('tr');
      if (time === DIVIDER_TIME) tr.classList.add('time-divider');
      if (hasGreenDivider(time, index)) tr.classList.add('time-green-divider');

      const tdTime = document.createElement('td');
      tdTime.className = 'time';
      if (index >= DIVIDER_INDEX) tdTime.classList.add('time-lower');
      tdTime.textContent = time;
      tr.appendChild(tdTime);

      days.forEach(day => {
        const dayData = getDayData(day);
        const name = getName(dayData[time]);

        const td = document.createElement('td');
        const rest = isRestDay(day);
        if (rest) {
          td.classList.add('cell-rest');
          const label = document.createElement('span');
          label.className = 'rest-label';
          label.textContent = '休息';
          td.appendChild(label);
        } else {
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = '姓名';
          input.value = name;
          if (name.trim() && name !== '休息') input.classList.add('is-booked');
          if (name === '休息') input.classList.add('is-rest-text');
          input.addEventListener('input', () => {
            input.classList.toggle('is-booked', !!input.value.trim() && input.value.trim() !== '休息');
            input.classList.toggle('is-rest-text', input.value.trim() === '休息');
            persistSlot(day, time, input.value);
          });
          attachCopyPaste(td, input, day, time);
          td.appendChild(input);
        }
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  function renderRangeHeader() {
    const days = getViewDays();
    const label = formatRangeLabel(days);
    const year = days.length ? days[0].getFullYear() : today.getFullYear();
    yearDisplay.textContent = `${year}年`;
    rangeDisplay.textContent = label;
    document.title = `推拿預約表 · ${year}年 ${label}`;
  }

  modeTabs.addEventListener('click', e => {
    const btn = e.target.closest('button[data-mode]');
    if (btn) setViewMode(btn.dataset.mode);
  });

  document.getElementById('btnPrev').addEventListener('click', navigatePrev);
  document.getElementById('btnNext').addEventListener('click', navigateNext);

  applySeedData();
  renderRangeHeader();
  renderTable();
})();
</script>

</body>
</html>
