<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約表</title>
<style>
  :root {
    --bg: #e8e8e8;
    --surface: #ffffff;
    --border: #bfbfbf;
    --text: #000000;
    --muted: #595959;
    --green-head: #70ad47;
    --blue-time: #2f5597;
    --gray-time: #595959;
    --red-head: #c00000;
    --gray-head: #a6a6a6;
    --gray-rest: #d9d9d9;
    --red-text: #c00000;
    --accent: #70ad47;
    --accent-hover: #5a8f38;
    --row-alt: #f2f2f2;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .app { max-width: 100%; margin: 0 auto; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .title-group {
    display: flex;
    align-items: baseline;
    gap: 10px;
    white-space: nowrap;
  }

  .top-bar h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .title-group .year {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--muted);
  }

  .top-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex: 1;
    min-width: 0;
  }

  .top-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    white-space: nowrap;
  }

  .mode-tabs {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
  }

  .mode-tabs button {
    padding: 5px 7px;
    border: none;
    background: transparent;
    border-radius: 5px;
    font-size: .75rem;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }

  .mode-tabs button:hover { color: var(--text); background: var(--row-alt); }

  .mode-tabs button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px 3px;
  }

  .date-nav button {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    font-size: .9rem;
    line-height: 1;
    color: var(--text);
    flex-shrink: 0;
  }

  .date-nav button:hover { background: var(--row-alt); }

  .date-display {
    font-weight: 600;
    font-size: .7rem;
    min-width: 58px;
    padding: 0 1px;
    text-align: center;
    white-space: nowrap;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    max-height: calc(100vh - 100px);
  }

  table {
    border-collapse: collapse;
    table-layout: fixed;
    min-width: max-content;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th {
    padding: 2px 2px;
    text-align: center;
    font-size: .68rem;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    line-height: 1.15;
    vertical-align: middle;
    white-space: nowrap;
  }

  thead th.col-time {
    background: var(--blue-time);
    color: #fff;
    width: 46px;
    min-width: 46px;
    max-width: 46px;
    position: sticky;
    left: 0;
    z-index: 4;
    border-right: 1px solid var(--border);
  }

  thead th.head-date {
    background: var(--green-head);
    color: #fff;
    border-bottom: 1px solid var(--green-head);
  }

  thead th.head-date.rest {
    background: var(--gray-head);
    font-size: .5rem;
    border-bottom: 1px solid var(--gray-head);
  }

  thead th.head-wd {
    background: var(--red-head);
    color: #fff;
    font-weight: 600;
    font-size: .58rem;
    border-top: 1px solid var(--red-head);
  }

  thead th.head-wd.rest {
    background: var(--gray-head);
    font-size: .52rem;
    border-top: 1px solid var(--gray-head);
  }

  thead th.col-day {
    width: 68px;
    min-width: 68px;
    max-width: 68px;
  }

  thead th.col-day.rest {
    width: 38px;
    min-width: 38px;
    max-width: 38px;
    padding: 3px 1px;
  }

  tbody tr { border-bottom: 1px solid var(--border); }

  td {
    padding: 0;
    vertical-align: middle;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  td.time {
    text-align: center;
    font-weight: 600;
    font-size: .68rem;
    color: #fff;
    background: var(--blue-time);
    padding: 2px 1px;
    user-select: none;
    position: sticky;
    left: 0;
    z-index: 1;
    border-right: 1px solid var(--border);
    width: 46px;
    min-width: 46px;
    max-width: 46px;
  }

  td.time.time-lower {
    background: var(--gray-time);
    color: #fff;
  }

  tbody tr.time-divider td {
    border-top: 3px solid var(--red-head);
  }

  tbody tr.time-green-divider td {
    border-bottom: 2px solid var(--green-head);
  }

  tbody tr:nth-child(even) td:not(.time):not(.cell-rest) {
    background: var(--row-alt);
  }

  td.cell-rest {
    background: var(--gray-rest);
    width: 38px;
    min-width: 38px;
    max-width: 38px;
  }
  td.cell-rest .rest-label {
    display: block;
    text-align: center;
    padding: 2px 1px;
    font-size: .6rem;
    color: #595959;
    user-select: none;
    line-height: 1.1;
    font-weight: 600;
  }

  td input {
    width: 100%;
    border: none;
    outline: none;
    padding: 2px 2px;
    font-size: .68rem;
    font-family: inherit;
    background: transparent;
    color: var(--text);
    text-align: center;
  }

  td input::placeholder { color: #bdbdbd; font-size: .58rem; }

  td input:focus {
    background: #fff9e6;
    box-shadow: inset 0 0 0 1px var(--green-head);
  }

  td input.is-booked {
    color: #000;
    font-weight: 700;
  }

  td input.is-rest-text {
    color: var(--red-text);
    font-weight: 700;
    font-size: .6rem;
  }

  td.cell-copied input {
    background: #dbeafe !important;
  }

  body.paste-mode td:not(.cell-rest) input {
    background: #f6ffed;
    box-shadow: inset 0 0 0 1px var(--green-head);
  }

  .batch-btn {
    padding: 6px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    font-size: .8rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }

  .batch-btn:hover { background: var(--row-alt); }

  .batch-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .batch-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  body.batch-mode td[data-selectable] {
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
  }

  body.batch-mode td[data-selectable] input {
    pointer-events: none;
    cursor: crosshair;
  }

  body.batch-mode.batch-dragging .table-wrap {
    touch-action: none;
  }

  thead th.head-date:not(.rest) {
    cursor: pointer;
  }

  thead th.head-date.col-copy-active {
    box-shadow: inset 0 0 0 2px #f59e0b;
  }

  body.column-paste-mode thead th.head-date:not(.rest) {
    box-shadow: inset 0 0 0 2px var(--green-head);
  }

  td.cell-selected input {
    background: #fef3c7 !important;
    box-shadow: inset 0 0 0 2px #f59e0b;
  }

  .cell-menu-layer {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
  }

  .cell-menu-layer.visible {
    display: block;
  }

  .cell-menu-backdrop {
    position: absolute;
    inset: 0;
    background: transparent;
  }

  .cell-menu {
    position: fixed;
    min-width: 132px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, .14);
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cell-menu button {
    border: none;
    background: transparent;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: .85rem;
    font-family: inherit;
    text-align: left;
    color: var(--text);
    cursor: pointer;
  }

  .cell-menu button:hover:not(:disabled),
  .cell-menu button:active:not(:disabled) {
    background: var(--row-alt);
  }

  .cell-menu button:disabled {
    color: #bbb;
    cursor: default;
  }

  .save-hint {
    text-align: center;
    font-size: .75rem;
    color: var(--muted);
    margin-top: 12px;
  }

  .save-hint.saved { color: #059669; }

  @media print {
    @page { size: landscape; margin: 8mm; }
    body { background: #fff; padding: 0; }
    .top-bar, .save-hint { display: none; }
    .table-wrap { box-shadow: none; border-radius: 0; max-height: none; overflow: visible; }
    td input { font-size: 7pt; padding: 2px; }
    thead th, td.time { position: static; }
  }
  @media (max-width: 720px) {
    .top-bar { flex-direction: column; align-items: flex-start; }
    .top-right { width: 100%; justify-content: flex-start; overflow-x: auto; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="title-group">
      <h1>大哥推拿預約表</h1>
      <span class="year" id="yearDisplay"></span>
    </div>
    <div class="top-right">
      <div class="top-controls">
        <div class="mode-tabs" id="modeTabs">
          <button type="button" data-mode="30days" class="active">30天</button>
          <button type="button" data-mode="month">當月</button>
          <button type="button" data-mode="nextMonth">下個月</button>
          <button type="button" data-mode="year">整年</button>
        </div>
        <div class="date-nav">
          <button type="button" id="btnPrev" title="上一段">‹</button>
          <div class="date-display" id="rangeDisplay"></div>
          <button type="button" id="btnNext" title="下一段">›</button>
        </div>
        <button type="button" class="batch-btn" id="btnBatch">批次</button>
        <button type="button" class="batch-btn" id="btnBatchCopy" disabled>複製</button>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="schedule"></tbody>
    </table>
  </div>

  <p class="save-hint" id="saveHint">長按格子或日期表頭開啟選單 · 批次可拖曳框選 · 資料自動儲存於本機瀏覽器</p>
</div>

<div class="cell-menu-layer" id="cellMenuLayer" aria-hidden="true">
  <div class="cell-menu-backdrop" id="cellMenuBackdrop"></div>
  <div class="cell-menu" id="cellMenu" role="menu">
    <button type="button" data-action="copy" role="menuitem">複製</button>
    <button type="button" data-action="paste" role="menuitem">貼上</button>
    <button type="button" data-action="clear" role="menuitem">清除</button>
  </div>
</div>

<script src="seed-data.js"></script>
<script>
(function () {
  const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
  const REST_DAYS = [0, 2, 4, 6];
  const STORAGE_KEY = 'tuina-booking-v1';
  const SEED_VERSION = '1';
  const SEED_FLAG = STORAGE_KEY + '-seed-v';
  const INTERVAL = 10;
  const DIVIDER_TIME = '16:50';
  const VIEW_DAYS = 30;

  const tableHead = document.getElementById('tableHead');
  const tbody = document.getElementById('schedule');
  const rangeDisplay = document.getElementById('rangeDisplay');
  const yearDisplay = document.getElementById('yearDisplay');
  const modeTabs = document.getElementById('modeTabs');
  const saveHint = document.getElementById('saveHint');
  const btnBatch = document.getElementById('btnBatch');
  const btnBatchCopy = document.getElementById('btnBatchCopy');
  const cellMenuLayer = document.getElementById('cellMenuLayer');
  const cellMenuBackdrop = document.getElementById('cellMenuBackdrop');
  const cellMenu = document.getElementById('cellMenu');
  const cellMenuButtons = cellMenu.querySelectorAll('button[data-action]');
  const tableWrap = document.querySelector('.table-wrap');

  const today = startOfDay(new Date());
  let viewMode = '30days';
  let viewStart = new Date(today);
  let saveTimer = null;
  let allData = loadAll();
  let copyQueue = [];
  let columnCopy = null;
  let batchMode = false;
  let selectedCells = new Set();
  let longPressTimer = null;
  let longPressed = false;
  let menuTouch = { x: 0, y: 0 };
  let cellMenuTarget = null;
  let dragSelect = null;
  const DEFAULT_HINT = '長按格子或日期表頭開啟選單 · 批次可拖曳框選 · 資料自動儲存於本機瀏覽器';

  function getColumnDataCount(day) {
    const dayData = getDayData(day);
    let count = 0;
    SLOTS.forEach(time => {
      if (getName(dayData[time]).trim()) count++;
    });
    return count;
  }

  function cellKey(day, time) {
    return dateKey(day) + '|' + time;
  }

  function getHintText() {
    if (columnCopy) {
      return '已複製整欄 · 長按其他日期表頭選貼上';
    }
    if (copyQueue.length > 1) {
      return `已複製 ${copyQueue.length} 個 · 長按格子選貼上（剩 ${copyQueue.length} 個）`;
    }
    if (copyQueue.length === 1) {
      return `已複製「${copyQueue[0]}」· 長按其他格子選貼上`;
    }
    return DEFAULT_HINT;
  }

  function clearCopyQueue() {
    copyQueue = [];
    document.body.classList.remove('paste-mode');
  }

  function clearColumnCopy() {
    columnCopy = null;
    document.body.classList.remove('column-paste-mode');
    document.querySelectorAll('.col-copy-active').forEach(el => el.classList.remove('col-copy-active'));
  }

  function copyColumn(day) {
    clearColumnCopy();
    clearCopyQueue();
    const dk = dateKey(day);
    const dayData = getDayData(day);
    const data = {};
    SLOTS.forEach(time => {
      const name = getName(dayData[time]).trim();
      if (name) data[time] = name;
    });
    if (!Object.keys(data).length) {
      showCopyHint('此日沒有預約可複製');
      return;
    }
    columnCopy = { dk, data };
    document.body.classList.add('column-paste-mode');
    const label = `${day.getMonth() + 1}/${day.getDate()}`;
    showCopyHint(`已複製 ${label} 共 ${Object.keys(data).length} 筆 · 長按其他日期表頭選貼上`);
  }

  function clearColumn(day) {
    const dk = dateKey(day);
    if (!allData[dk]) return;
    SLOTS.forEach(time => {
      delete allData[dk][time];
    });
    if (Object.keys(allData[dk]).length === 0) delete allData[dk];
    saveAll();
    renderTable();
    showCopyHint(`已清除 ${day.getMonth() + 1}/${day.getDate()} 整欄`);
  }

  function pasteColumn(day) {
    if (!columnCopy) return;
    if (isRestDay(day)) {
      showCopyHint('休息日無法貼上');
      return;
    }
    const dk = dateKey(day);
    if (dk === columnCopy.dk) {
      copyColumn(day);
      return;
    }
    if (!allData[dk]) allData[dk] = {};
    let count = 0;
    SLOTS.forEach(time => {
      if (columnCopy.data[time]) {
        allData[dk][time] = columnCopy.data[time];
        count++;
      }
    });
    saveAll();
    clearColumnCopy();
    renderTable();
    showCopyHint(`已貼上 ${count} 筆到 ${day.getMonth() + 1}/${day.getDate()}`);
  }

  function updateBatchUI() {
    btnBatch.classList.toggle('active', batchMode);
    document.body.classList.toggle('batch-mode', batchMode);
    btnBatchCopy.disabled = selectedCells.size === 0;
    btnBatchCopy.textContent = selectedCells.size ? `複製(${selectedCells.size})` : '複製';
    if (batchMode && selectedCells.size > 0) {
      saveHint.textContent = `批次模式 · 已選 ${selectedCells.size} 格 · 點複製`;
    } else if (!copyQueue.length) {
      saveHint.textContent = batchMode ? '批次模式 · 拖曳框選格子' : DEFAULT_HINT;
    }
  }

  function endDragSelect() {
    dragSelect = null;
    document.body.classList.remove('batch-dragging');
  }

  function updateDragSelection() {
    if (!dragSelect) return;
    const minCol = Math.min(dragSelect.startCol, dragSelect.endCol);
    const maxCol = Math.max(dragSelect.startCol, dragSelect.endCol);
    const minRow = Math.min(dragSelect.startRow, dragSelect.endRow);
    const maxRow = Math.max(dragSelect.startRow, dragSelect.endRow);
    selectedCells.clear();
    tbody.querySelectorAll('td[data-selectable]').forEach(td => {
      const col = +td.dataset.col;
      const row = +td.dataset.row;
      const inRange = col >= minCol && col <= maxCol && row >= minRow && row <= maxRow;
      td.classList.toggle('cell-selected', inRange);
      if (inRange) selectedCells.add(td.dataset.key);
    });
    updateBatchUI();
  }

  function getSelectableTdFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    return el ? el.closest('td[data-selectable]') : null;
  }

  function onBatchPointerDown(e) {
    if (!batchMode || e.button !== 0) return;
    const td = e.target.closest('td[data-selectable]');
    if (!td) return;
    e.preventDefault();
    hideCellMenu();
    dragSelect = {
      pointerId: e.pointerId,
      startCol: +td.dataset.col,
      startRow: +td.dataset.row,
      endCol: +td.dataset.col,
      endRow: +td.dataset.row
    };
    document.body.classList.add('batch-dragging');
    tbody.setPointerCapture(e.pointerId);
    updateDragSelection();
  }

  function onBatchPointerMove(e) {
    if (!batchMode || !dragSelect || e.pointerId !== dragSelect.pointerId) return;
    e.preventDefault();
    const td = getSelectableTdFromPoint(e.clientX, e.clientY);
    if (td) {
      dragSelect.endCol = +td.dataset.col;
      dragSelect.endRow = +td.dataset.row;
      updateDragSelection();
    }
  }

  function onBatchPointerUp(e) {
    if (!dragSelect || e.pointerId !== dragSelect.pointerId) return;
    try { tbody.releasePointerCapture(e.pointerId); } catch (_) {}
    endDragSelect();
  }

  function restoreBatchSelection() {
    if (!batchMode) return;
    tbody.querySelectorAll('td[data-selectable]').forEach(td => {
      td.classList.toggle('cell-selected', selectedCells.has(td.dataset.key));
    });
    updateBatchUI();
  }

  function toggleBatchMode() {
    batchMode = !batchMode;
    selectedCells.clear();
    endDragSelect();
    tbody.querySelectorAll('.cell-selected').forEach(el => el.classList.remove('cell-selected'));
    if (!batchMode) clearCopyQueue();
    else clearColumnCopy();
    updateBatchUI();
  }

  function batchCopy() {
    const entries = [];
    tbody.querySelectorAll('td.cell-selected[data-selectable]').forEach(td => {
      const key = td.dataset.key;
      const sep = key.lastIndexOf('|');
      entries.push({
        row: +td.dataset.row,
        col: +td.dataset.col,
        dk: key.slice(0, sep),
        time: key.slice(sep + 1)
      });
    });
    entries.sort((a, b) => a.row - b.row || a.col - b.col);

    const items = entries
      .map(({ dk, time }) => getName((allData[dk] || {})[time]).trim())
      .filter(Boolean);
    if (!items.length) return;

    copyQueue = items;
    clearColumnCopy();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(items.join('\n')).catch(() => {});
    }
    document.body.classList.add('paste-mode');
    batchMode = false;
    selectedCells.clear();
    tbody.querySelectorAll('.cell-selected').forEach(el => el.classList.remove('cell-selected'));
    document.body.classList.remove('batch-mode');
    btnBatch.classList.remove('active');
    showCopyHint(`已複製 ${items.length} 個名字 · 長按格子選貼上`);
  }

  function hideCellMenu() {
    cellMenuLayer.classList.remove('visible');
    cellMenuLayer.setAttribute('aria-hidden', 'true');
    cellMenuTarget = null;
  }

  function positionCellMenu(x, y) {
    cellMenu.style.visibility = 'hidden';
    cellMenu.style.left = '0';
    cellMenu.style.top = '0';
    const mw = cellMenu.offsetWidth;
    const mh = cellMenu.offsetHeight;
    let left = x - mw / 2;
    let top = y - mh - 12;
    if (top < 8) top = y + 12;
    left = Math.max(8, Math.min(left, window.innerWidth - mw - 8));
    top = Math.max(8, Math.min(top, window.innerHeight - mh - 8));
    cellMenu.style.left = `${left}px`;
    cellMenu.style.top = `${top}px`;
    cellMenu.style.visibility = '';
  }

  function updateCellMenuButtons() {
    if (!cellMenuTarget) return;
    if (cellMenuTarget.type === 'column') {
      const { day } = cellMenuTarget;
      const count = getColumnDataCount(day);
      const canPaste = columnCopy && dateKey(day) !== columnCopy.dk;
      cellMenuButtons.forEach(btn => {
        const action = btn.dataset.action;
        if (action === 'copy') btn.disabled = count === 0;
        else if (action === 'paste') btn.disabled = !canPaste;
        else if (action === 'clear') btn.disabled = count === 0;
      });
      return;
    }
    const val = cellMenuTarget.input.value.trim();
    cellMenuButtons.forEach(btn => {
      const action = btn.dataset.action;
      if (action === 'copy') btn.disabled = !val;
      else if (action === 'paste') btn.disabled = !copyQueue.length;
      else if (action === 'clear') btn.disabled = !val;
    });
  }

  function showCellMenu(x, y, ctx) {
    cellMenuTarget = ctx;
    updateCellMenuButtons();
    cellMenuLayer.classList.add('visible');
    cellMenuLayer.setAttribute('aria-hidden', 'false');
    positionCellMenu(x, y);
  }

  function clearCell(input, day, time) {
    applyNameToInput(input, day, time, '');
    showCopyHint('已清除');
    input.blur();
  }

  function handleCellMenuAction(action) {
    if (!cellMenuTarget) return;
    const target = cellMenuTarget;
    hideCellMenu();
    if (target.type === 'column') {
      const { day, th } = target;
      if (action === 'copy') {
        copyColumn(day);
        th.classList.add('col-copy-active');
        return;
      }
      if (action === 'paste') {
        pasteColumn(day);
        return;
      }
      if (action === 'clear') {
        clearColumn(day);
      }
      return;
    }
    const { td, input, day, time } = target;
    if (action === 'copy') {
      const val = input.value.trim();
      if (val) copyName(val, td);
      return;
    }
    if (action === 'paste') {
      pasteName(input, day, time);
      return;
    }
    if (action === 'clear') {
      clearCell(input, day, time);
    }
  }

  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  }

  function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function isRestDay(date) {
    return REST_DAYS.includes(date.getDay());
  }

  function loadAll() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch {
      return {};
    }
  }

  function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    saveHint.textContent = '已儲存';
    saveHint.classList.add('saved');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveHint.textContent = getHintText();
      saveHint.classList.remove('saved');
    }, 2000);
  }

  function showCopyHint(msg) {
    saveHint.textContent = msg;
    saveHint.classList.add('saved');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveHint.textContent = getHintText();
      saveHint.classList.remove('saved');
    }, 2500);
  }

  function copyName(name, td) {
    clearColumnCopy();
    copyQueue = [name];
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(name).catch(() => {});
    }
    document.body.classList.add('paste-mode');
    showCopyHint(`已複製「${name}」· 長按其他格子選貼上`);
    if (td) {
      td.classList.add('cell-copied');
      setTimeout(() => td.classList.remove('cell-copied'), 800);
    }
  }

  function applyNameToInput(input, day, time, name) {
    input.value = name;
    input.classList.toggle('is-booked', name !== '休息');
    input.classList.toggle('is-rest-text', name === '休息');
    persistSlot(day, time, name);
  }

  function pasteName(input, day, time) {
    if (!copyQueue.length) return;
    const name = copyQueue.shift();
    applyNameToInput(input, day, time, name);
    if (!copyQueue.length) document.body.classList.remove('paste-mode');
    showCopyHint(
      copyQueue.length
        ? `已貼上「${name}」· 剩 ${copyQueue.length} 個`
        : `已貼上「${name}」`
    );
    input.blur();
  }

  function attachCopyPaste(td, input, day, time) {
    function clearLongPress() {
      clearTimeout(longPressTimer);
    }

    function openCellMenu(e) {
      if (batchMode) return;
      if (e.type === 'contextmenu') e.preventDefault();
      const x = e.clientX ?? menuTouch.x;
      const y = e.clientY ?? menuTouch.y;
      showCellMenu(x, y, { type: 'cell', td, input, day, time });
    }

    function startLongPress(e) {
      if (batchMode) return;
      longPressed = false;
      if (e.touches && e.touches[0]) {
        menuTouch.x = e.touches[0].clientX;
        menuTouch.y = e.touches[0].clientY;
      } else if (e.clientX != null) {
        menuTouch.x = e.clientX;
        menuTouch.y = e.clientY;
      }
      clearLongPress();
      longPressTimer = setTimeout(() => {
        longPressed = true;
        if (navigator.vibrate) navigator.vibrate(10);
        openCellMenu(e);
      }, 500);
    }

    input.addEventListener('touchstart', startLongPress, { passive: true });
    input.addEventListener('touchend', clearLongPress);
    input.addEventListener('touchmove', clearLongPress);
    input.addEventListener('touchcancel', clearLongPress);

    input.addEventListener('mousedown', startLongPress);
    input.addEventListener('mouseup', clearLongPress);
    input.addEventListener('mouseleave', clearLongPress);

    input.addEventListener('click', e => {
      if (longPressed) {
        e.preventDefault();
        longPressed = false;
      }
    });

    input.addEventListener('contextmenu', openCellMenu);
  }

  function attachDateHeaderMenu(th, day) {
    let headerPressTimer = null;
    let headerLongPressed = false;

    function clearPress() {
      clearTimeout(headerPressTimer);
    }

    function openMenu(e) {
      if (e.type === 'contextmenu') e.preventDefault();
      const x = e.clientX ?? menuTouch.x;
      const y = e.clientY ?? menuTouch.y;
      showCellMenu(x, y, { type: 'column', day, th });
    }

    function startPress(e) {
      headerLongPressed = false;
      if (e.touches && e.touches[0]) {
        menuTouch.x = e.touches[0].clientX;
        menuTouch.y = e.touches[0].clientY;
      } else if (e.clientX != null) {
        menuTouch.x = e.clientX;
        menuTouch.y = e.clientY;
      }
      clearPress();
      headerPressTimer = setTimeout(() => {
        headerLongPressed = true;
        if (navigator.vibrate) navigator.vibrate(10);
        openMenu(e);
      }, 500);
    }

    th.addEventListener('touchstart', startPress, { passive: true });
    th.addEventListener('touchend', clearPress);
    th.addEventListener('touchmove', clearPress);
    th.addEventListener('touchcancel', clearPress);
    th.addEventListener('mousedown', startPress);
    th.addEventListener('mouseup', clearPress);
    th.addEventListener('mouseleave', clearPress);
    th.addEventListener('click', e => {
      if (headerLongPressed) {
        e.preventDefault();
        headerLongPressed = false;
      }
    });
    th.addEventListener('contextmenu', openMenu);
  }

  cellMenuButtons.forEach(btn => {
    btn.addEventListener('click', () => handleCellMenuAction(btn.dataset.action));
  });
  cellMenuBackdrop.addEventListener('click', hideCellMenu);
  tableWrap.addEventListener('scroll', hideCellMenu, { passive: true });
  window.addEventListener('resize', hideCellMenu);

  tbody.addEventListener('pointerdown', onBatchPointerDown);
  tbody.addEventListener('pointermove', onBatchPointerMove);
  tbody.addEventListener('pointerup', onBatchPointerUp);
  tbody.addEventListener('pointercancel', onBatchPointerUp);

  function formatTime(h, m) {
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function generateSlots() {
    const slots = [];
    let h = 17;
    let m = 0;
    while (h < 21 || (h === 21 && m <= 30)) {
      slots.push(formatTime(h, m));
      m += INTERVAL;
      if (m >= 60) { m = 0; h++; }
    }
    h = 16;
    m = 50;
    while (h > 12 || (h === 12 && m >= 40)) {
      slots.push(formatTime(h, m));
      m -= INTERVAL;
      if (m < 0) { m = 50; h--; }
    }
    return slots;
  }

  const SLOTS = generateSlots();
  const DIVIDER_INDEX = SLOTS.indexOf(DIVIDER_TIME);

  function hasGreenDivider(time, index) {
    const next = SLOTS[index + 1];
    if (!next) return false;
    if (index < DIVIDER_INDEX && time.endsWith(':50') && next.endsWith(':00')) return true;
    if (index >= DIVIDER_INDEX && time.endsWith(':00') && next.endsWith(':50')) return true;
    return false;
  }

  function getMonthDays(year, month) {
    const last = new Date(year, month + 1, 0).getDate();
    let startDay = 1;
    if (year === today.getFullYear() && month === today.getMonth()) {
      startDay = today.getDate();
    }
    const days = [];
    for (let d = startDay; d <= last; d++) {
      days.push(new Date(year, month, d));
    }
    return days;
  }

  function getFullMonthDays(year, month) {
    const last = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let d = 1; d <= last; d++) {
      days.push(new Date(year, month, d));
    }
    return days;
  }

  function getViewDays() {
    const y = viewStart.getFullYear();
    const m = viewStart.getMonth();

    if (viewMode === '30days') {
      const days = [];
      for (let i = 0; i < VIEW_DAYS; i++) {
        const d = new Date(viewStart);
        d.setDate(d.getDate() + i);
        days.push(startOfDay(d));
      }
      return days;
    }

    if (viewMode === 'month') {
      return getMonthDays(y, m);
    }

    if (viewMode === 'nextMonth') {
      return getFullMonthDays(y, m);
    }

    if (viewMode === 'year') {
      const days = [];
      const end = new Date(y, 11, 31);
      let d = new Date(viewStart);
      if (y === today.getFullYear() && d < today) d = new Date(today);
      while (d <= end) {
        days.push(startOfDay(new Date(d)));
        d.setDate(d.getDate() + 1);
      }
      return days;
    }

    return [];
  }

  function formatRangeLabel(days) {
    if (!days.length) return '';
    const first = days[0];
    const last = days[days.length - 1];

    if (viewMode === 'month' || viewMode === 'nextMonth') {
      return `${first.getMonth() + 1} 月`;
    }

    if (viewMode === 'year') {
      return '全年';
    }

    return `${first.getMonth() + 1}/${first.getDate()} – ${last.getMonth() + 1}/${last.getDate()}`;
  }

  function setViewMode(mode) {
    viewMode = mode;
    modeTabs.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });

    if (mode === '30days') {
      viewStart = new Date(today);
    } else if (mode === 'month') {
      viewStart = new Date(today.getFullYear(), today.getMonth(), 1);
    } else if (mode === 'nextMonth') {
      viewStart = new Date(today.getFullYear(), today.getMonth() + 1, 1);
    } else if (mode === 'year') {
      viewStart = new Date(today);
    }

    renderRangeHeader();
    renderTable();
  }

  function navigatePrev() {
    if (viewMode === '30days') {
      viewStart.setDate(viewStart.getDate() - VIEW_DAYS);
    } else if (viewMode === 'month' || viewMode === 'nextMonth') {
      viewStart = new Date(viewStart.getFullYear(), viewStart.getMonth() - 1, 1);
    } else if (viewMode === 'year') {
      viewStart = new Date(viewStart.getFullYear() - 1, 0, 1);
    }
    viewStart = startOfDay(viewStart);
    renderRangeHeader();
    renderTable();
  }

  function navigateNext() {
    if (viewMode === '30days') {
      viewStart.setDate(viewStart.getDate() + VIEW_DAYS);
    } else if (viewMode === 'month' || viewMode === 'nextMonth') {
      viewStart = new Date(viewStart.getFullYear(), viewStart.getMonth() + 1, 1);
    } else if (viewMode === 'year') {
      viewStart = new Date(viewStart.getFullYear() + 1, 0, 1);
    }
    viewStart = startOfDay(viewStart);
    renderRangeHeader();
    renderTable();
  }

  function getName(entry) {
    if (!entry) return '';
    if (typeof entry === 'string') return entry;
    return entry.name || '';
  }

  function applySeedData() {
    if (!window.SEED_DATA) return;
    if (localStorage.getItem(SEED_FLAG) === SEED_VERSION) return;
    Object.keys(SEED_DATA).forEach(key => {
      allData[key] = Object.assign({}, allData[key], SEED_DATA[key]);
    });
    localStorage.setItem(SEED_FLAG, SEED_VERSION);
    saveAll();
  }

  function getDayData(date) {
    const key = dateKey(date);
    return allData[key] || {};
  }

  function persistSlot(date, time, value) {
    const key = dateKey(date);
    const name = value.trim();
    if (name) {
      if (!allData[key]) allData[key] = {};
      allData[key][time] = name;
    } else if (allData[key]) {
      delete allData[key][time];
      if (Object.keys(allData[key]).length === 0) delete allData[key];
    }
    saveAll();
  }

  function renderTable() {
    hideCellMenu();
    const days = getViewDays();

    tableHead.innerHTML = '';

    const rowDate = document.createElement('tr');
    const thTime = document.createElement('th');
    thTime.className = 'col-time';
    thTime.rowSpan = 2;
    thTime.textContent = '時間';
    rowDate.appendChild(thTime);

    days.forEach(day => {
      const th = document.createElement('th');
      th.className = 'col-day head-date';
      if (isRestDay(day)) th.classList.add('rest');
      const m = String(day.getMonth() + 1).padStart(2, '0');
      th.textContent = `${m}月${day.getDate()}日`;
      if (!isRestDay(day)) {
        th.title = '長按開啟選單（整欄複製 / 貼上 / 清除）';
        attachDateHeaderMenu(th, day);
      }
      if (columnCopy && dateKey(day) === columnCopy.dk) th.classList.add('col-copy-active');
      rowDate.appendChild(th);
    });
    tableHead.appendChild(rowDate);

    const rowWd = document.createElement('tr');
    days.forEach(day => {
      const th = document.createElement('th');
      th.className = 'col-day head-wd';
      const wd = day.getDay();
      if (isRestDay(day)) th.classList.add('rest');
      th.textContent = isRestDay(day) ? `週${WEEKDAYS[wd]}` : `星期${WEEKDAYS[wd]}`;
      rowWd.appendChild(th);
    });
    tableHead.appendChild(rowWd);

    tbody.innerHTML = '';
    SLOTS.forEach((time, index) => {
      const tr = document.createElement('tr');
      if (time === DIVIDER_TIME) tr.classList.add('time-divider');
      if (hasGreenDivider(time, index)) tr.classList.add('time-green-divider');

      const tdTime = document.createElement('td');
      tdTime.className = 'time';
      if (index >= DIVIDER_INDEX) tdTime.classList.add('time-lower');
      tdTime.textContent = time;
      tr.appendChild(tdTime);

      days.forEach((day, dayIndex) => {
        const dayData = getDayData(day);
        const name = getName(dayData[time]);

        const td = document.createElement('td');
        const rest = isRestDay(day);
        if (rest) {
          td.classList.add('cell-rest');
          const label = document.createElement('span');
          label.className = 'rest-label';
          label.textContent = '休息';
          td.appendChild(label);
        } else {
          const slotKey = cellKey(day, time);
          td.dataset.selectable = '1';
          td.dataset.col = String(dayIndex);
          td.dataset.row = String(index);
          td.dataset.key = slotKey;
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = '姓名';
          input.value = name;
          if (name.trim() && name !== '休息') input.classList.add('is-booked');
          if (name === '休息') input.classList.add('is-rest-text');
          input.addEventListener('input', () => {
            input.classList.toggle('is-booked', !!input.value.trim() && input.value.trim() !== '休息');
            input.classList.toggle('is-rest-text', input.value.trim() === '休息');
            persistSlot(day, time, input.value);
          });
          attachCopyPaste(td, input, day, time);
          td.appendChild(input);
        }
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
    restoreBatchSelection();
  }

  function renderRangeHeader() {
    const days = getViewDays();
    const label = formatRangeLabel(days);
    const year = days.length ? days[0].getFullYear() : today.getFullYear();
    yearDisplay.textContent = `${year}年`;
    rangeDisplay.textContent = label;
    document.title = '預約表';
  }

  modeTabs.addEventListener('click', e => {
    const btn = e.target.closest('button[data-mode]');
    if (btn) setViewMode(btn.dataset.mode);
  });

  document.getElementById('btnPrev').addEventListener('click', navigatePrev);
  document.getElementById('btnNext').addEventListener('click', navigateNext);
  btnBatch.addEventListener('click', toggleBatchMode);
  btnBatchCopy.addEventListener('click', batchCopy);

  applySeedData();
  renderRangeHeader();
  renderTable();
})();
</script>

</body>
</html>
