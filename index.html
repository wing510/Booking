<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推拿預約表</title>
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --border: #e2e6ea;
    --text: #1a1d21;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --booked: #ecfdf5;
    --booked-border: #6ee7b7;
    --today: #eff6ff;
    --today-border: #93c5fd;
    --rest: #fef2f2;
    --rest-head: #fee2e2;
    --header: #1e293b;
    --time-bg: #f8fafc;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .app { max-width: 100%; margin: 0 auto; }

  header {
    background: var(--header);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }

  header h1 { font-size: 1.35rem; font-weight: 600; }
  header p { margin-top: 4px; font-size: .875rem; color: #94a3b8; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 200px;
  }

  .date-nav button {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text);
  }

  .date-nav button:hover { background: var(--time-bg); }

  .date-display {
    flex: 1;
    text-align: center;
    font-weight: 600;
    font-size: 1.05rem;
  }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: .875rem;
    cursor: pointer;
    font-family: inherit;
  }

  .btn:hover { background: var(--time-bg); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .table-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: auto;
    max-height: calc(100vh - 220px);
  }

  table {
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
    min-width: max-content;
  }

  thead th {
    background: var(--time-bg);
    padding: 6px 2px;
    text-align: center;
    font-size: .7rem;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    line-height: 1.3;
    vertical-align: bottom;
  }

  thead th.col-time {
    width: 52px;
    min-width: 52px;
    left: 0;
    z-index: 3;
    border-right: 2px solid var(--border);
  }

  thead th.col-day {
    width: 72px;
    min-width: 72px;
  }

  thead th.rest { background: var(--rest-head); color: #b91c1c; }
  thead th.today { background: var(--today-border); color: #1d4ed8; }

  thead th .day-num { font-size: .85rem; font-weight: 700; display: block; }
  thead th .day-wd { font-size: .65rem; font-weight: 500; }

  tbody tr { border-bottom: 1px solid var(--border); }

  td {
    padding: 0;
    vertical-align: middle;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  td.time {
    text-align: center;
    font-weight: 600;
    font-size: .75rem;
    color: var(--muted);
    background: var(--time-bg);
    padding: 4px 2px;
    user-select: none;
    position: sticky;
    left: 0;
    z-index: 1;
    border-right: 2px solid var(--border);
    width: 52px;
    min-width: 52px;
  }

  tbody tr.time-divider td {
    border-top: 3px solid #dc2626;
  }

  td.cell-rest { background: #fffafa; }
  td.cell-rest .rest-label {
    display: block;
    text-align: center;
    padding: 5px 4px;
    font-size: .75rem;
    color: #b91c1c;
    user-select: none;
  }
  td.cell-today { background: var(--today); }

  td.booked { background: var(--booked) !important; }

  td input {
    width: 100%;
    border: none;
    outline: none;
    padding: 5px 4px;
    font-size: .75rem;
    font-family: inherit;
    background: transparent;
    color: var(--text);
    text-align: center;
  }

  td input::placeholder { color: #d1d5db; font-size: .65rem; }

  td input:focus {
    background: rgba(37, 99, 235, .08);
    box-shadow: inset 0 0 0 2px rgba(37, 99, 235, .3);
  }

  td input.is-rest-text {
    color: #dc2626;
    font-weight: 600;
  }

  .save-hint {
    text-align: center;
    font-size: .75rem;
    color: var(--muted);
    margin-top: 12px;
  }

  .save-hint.saved { color: #059669; }

  @media print {
    @page { size: landscape; margin: 8mm; }
    body { background: #fff; padding: 0; }
    header, .toolbar, .save-hint { display: none; }
    .table-wrap { box-shadow: none; border-radius: 0; max-height: none; overflow: visible; }
    td input { font-size: 7pt; padding: 2px; }
    thead th, td.time { position: static; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>推拿預約表</h1>
    <p>未來 30 天預約一覽 · 17:00–21:30 / 16:50–12:40 · 每 10 分鐘 · 休息日：週二、週四、週六、週日</p>
  </header>

  <div class="toolbar">
    <div class="date-nav">
      <button type="button" id="btnPrev" title="前 30 天">‹</button>
      <div class="date-display" id="rangeDisplay"></div>
      <button type="button" id="btnNext" title="後 30 天">›</button>
    </div>
    <div class="actions">
      <button type="button" class="btn" id="btnToday">今天起</button>
      <button type="button" class="btn btn-primary" id="btnPrint">列印</button>
      <button type="button" class="btn" id="btnClear">清空此區間</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="schedule"></tbody>
    </table>
  </div>

  <p class="save-hint" id="saveHint">資料自動儲存於本機瀏覽器</p>
</div>

<script src="seed-data.js"></script>
<script>
(function () {
  const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
  const REST_DAYS = [0, 2, 4, 6];
  const STORAGE_KEY = 'tuina-booking-v1';
  const SEED_VERSION = '1';
  const SEED_FLAG = STORAGE_KEY + '-seed-v';
  const INTERVAL = 10;
  const DIVIDER_TIME = '16:50';

  const VIEW_DAYS = 30;
  const tableHead = document.getElementById('tableHead');
  const tbody = document.getElementById('schedule');
  const rangeDisplay = document.getElementById('rangeDisplay');
  const saveHint = document.getElementById('saveHint');

  const today = startOfDay(new Date());
  let viewStart = new Date(today);
  let saveTimer = null;
  let allData = loadAll();

  function startOfDay(d) {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  }

  function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function isRestDay(date) {
    return REST_DAYS.includes(date.getDay());
  }

  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
  }

  function loadAll() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch {
      return {};
    }
  }

  function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    saveHint.textContent = '已儲存';
    saveHint.classList.add('saved');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveHint.textContent = '資料自動儲存於本機瀏覽器';
      saveHint.classList.remove('saved');
    }, 2000);
  }

  function formatTime(h, m) {
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function generateSlots() {
    const slots = [];
    let h = 17;
    let m = 0;
    while (h < 21 || (h === 21 && m <= 30)) {
      slots.push(formatTime(h, m));
      m += INTERVAL;
      if (m >= 60) { m = 0; h++; }
    }
    h = 16;
    m = 50;
    while (h > 12 || (h === 12 && m >= 40)) {
      slots.push(formatTime(h, m));
      m -= INTERVAL;
      if (m < 0) { m = 50; h--; }
    }
    return slots;
  }

  const SLOTS = generateSlots();

  function getViewDays() {
    const days = [];
    for (let i = 0; i < VIEW_DAYS; i++) {
      const d = new Date(viewStart);
      d.setDate(d.getDate() + i);
      days.push(startOfDay(d));
    }
    return days;
  }

  function formatRangeLabel(days) {
    const first = days[0];
    const last = days[days.length - 1];
    const fy = first.getFullYear();
    const ly = last.getFullYear();
    if (fy === ly) {
      return `${fy} 年 ${first.getMonth() + 1}/${first.getDate()} – ${last.getMonth() + 1}/${last.getDate()}`;
    }
    return `${fy}/${first.getMonth() + 1}/${first.getDate()} – ${ly}/${last.getMonth() + 1}/${last.getDate()}`;
  }

  function getName(entry) {
    if (!entry) return '';
    if (typeof entry === 'string') return entry;
    return entry.name || '';
  }

  function applySeedData() {
    if (!window.SEED_DATA) return;
    if (localStorage.getItem(SEED_FLAG) === SEED_VERSION) return;
    Object.keys(SEED_DATA).forEach(key => {
      allData[key] = Object.assign({}, allData[key], SEED_DATA[key]);
    });
    localStorage.setItem(SEED_FLAG, SEED_VERSION);
    saveAll();
  }

  function getDayData(date) {
    const key = dateKey(date);
    return allData[key] || {};
  }

  function persistSlot(date, time, value) {
    const key = dateKey(date);
    const name = value.trim();
    if (name) {
      if (!allData[key]) allData[key] = {};
      allData[key][time] = name;
    } else if (allData[key]) {
      delete allData[key][time];
      if (Object.keys(allData[key]).length === 0) delete allData[key];
    }
    saveAll();
  }

  function renderTable() {
    const days = getViewDays();

    tableHead.innerHTML = '';
    const headRow = document.createElement('tr');
    const thTime = document.createElement('th');
    thTime.className = 'col-time';
    thTime.textContent = '時間';
    headRow.appendChild(thTime);

    days.forEach(day => {
      const th = document.createElement('th');
      th.className = 'col-day';
      const wd = day.getDay();
      if (isRestDay(day)) th.classList.add('rest');
      if (isSameDay(day, today) && !isRestDay(day)) th.classList.add('today');
      th.innerHTML =
        `<span class="day-num">${day.getMonth() + 1}/${day.getDate()}</span>` +
        `<span class="day-wd">星期${WEEKDAYS[wd]}</span>`;
      headRow.appendChild(th);
    });
    tableHead.appendChild(headRow);

    tbody.innerHTML = '';
    SLOTS.forEach(time => {
      const tr = document.createElement('tr');
      if (time === DIVIDER_TIME) tr.classList.add('time-divider');

      const tdTime = document.createElement('td');
      tdTime.className = 'time';
      tdTime.textContent = time;
      tr.appendChild(tdTime);

      days.forEach(day => {
        const dayData = getDayData(day);
        const name = getName(dayData[time]);

        const td = document.createElement('td');
        const rest = isRestDay(day);
        if (rest) {
          td.classList.add('cell-rest');
          const label = document.createElement('span');
          label.className = 'rest-label';
          label.textContent = '休息';
          td.appendChild(label);
        } else {
          if (isSameDay(day, today)) td.classList.add('cell-today');
          if (name.trim() && name !== '休息') td.classList.add('booked');

          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = '姓名';
          input.value = name;
          if (name === '休息') input.classList.add('is-rest-text');
          input.addEventListener('input', () => {
            td.classList.toggle('booked', !!input.value.trim() && input.value.trim() !== '休息');
            input.classList.toggle('is-rest-text', input.value.trim() === '休息');
            persistSlot(day, time, input.value);
          });
          td.appendChild(input);
        }
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  function renderRangeHeader() {
    const days = getViewDays();
    const label = formatRangeLabel(days);
    rangeDisplay.textContent = label;
    document.title = `推拿預約表 · ${label}`;
  }

  function changeRange(deltaDays) {
    const d = new Date(viewStart);
    d.setDate(d.getDate() + deltaDays);
    viewStart = startOfDay(d);
    renderRangeHeader();
    renderTable();
  }

  document.getElementById('btnPrev').addEventListener('click', () => changeRange(-VIEW_DAYS));
  document.getElementById('btnNext').addEventListener('click', () => changeRange(VIEW_DAYS));
  document.getElementById('btnToday').addEventListener('click', () => {
    viewStart = new Date(today);
    renderRangeHeader();
    renderTable();
  });
  document.getElementById('btnPrint').addEventListener('click', () => window.print());
  document.getElementById('btnClear').addEventListener('click', () => {
    const days = getViewDays();
    const label = formatRangeLabel(days);
    if (!confirm(`確定要清空 ${label} 的所有預約嗎？`)) return;
    days.forEach(day => {
      delete allData[dateKey(day)];
    });
    saveAll();
    renderTable();
  });

  applySeedData();
  renderRangeHeader();
  renderTable();
})();
</script>

</body>
</html>
